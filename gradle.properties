# AGP 8.2 ya no usa el Support Library legacy; AndroidX es obligatorio
# si declarás cualquier dependencia `androidx.*` (que sí lo hacemos:
# activity + core-ktx).
android.useAndroidX=true

# Migra automáticamente cualquier dependencia transitoria que todavía
# referencie el Support Library viejo. No estorba aunque no apliquemos
# Jetifier — es un seguro por si una transitive arrastra clases legacy.
android.enableJetifier=true

# Memoria del daemon de Gradle: cuando JitPack buildea con muchos
# Android SDK installs, el default (512m) se queda corto y vemos OOM.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# JDK 17 es lo que tanto jitpack.yml como AGP 8.2 esperan.
org.gradle.java.installations.auto-detect=true
